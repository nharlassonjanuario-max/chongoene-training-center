<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div class="login-box">

        <img src="image/logotipo.png" alt="Logo">

        <h2>Criar Conta</h2>

        <input
            id="nome"
            type="text"
            placeholder="Nome Completo">

        <input
            id="telefone"
            type="text"
            placeholder="Telefone">

        <input
            id="email"
            type="email"
            placeholder="Email">

        <input
            id="senha"
            type="password"
            placeholder="Senha">

        <button onclick="registar()">
            Criar Conta
        </button>

        <p>
            Já possui conta?
            <a href="login-aluno.html">
                Entrar
            </a>
        </p>

    </div>

    <script type="module" src="js/register.js"></script>

</body>
</html>
