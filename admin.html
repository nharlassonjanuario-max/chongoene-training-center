<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo</title>

    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

<div class="container">

    <aside class="sidebar">

        <div class="logo-admin">
            <img src="image/logotipo.png" alt="Logotipo">
            <h2>Chongoene</h2>
            <p>Computer Training Center</p>
        </div>

        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="admin.html">Inscrições</a>
            <a href="#" onclick="logout()">Sair</a>
        </nav>

    </aside>

    <main class="main">

        <div class="header">
            <h1>Painel Administrativo</h1>

            <button class="btn-logout" onclick="logout()">
                Sair
            </button>
        </div>

        <div class="cards">

            <div class="card blue">
                <h3>Total</h3>
                <span id="total">0</span>
            </div>

            <div class="card green">
                <h3>Confirmados</h3>
                <span id="confirmados">0</span>
            </div>

            <div class="card orange">
                <h3>Pendentes</h3>
                <span id="pendentes">0</span>
            </div>

        </div>

        <div class="table-container">

            <table>

                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Curso</th>
                        <th>Nível</th>
                        <th>Pagamento</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="lista">

                </tbody>

            </table>

        </div>

    </main>

</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
