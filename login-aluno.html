<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login do Aluno</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div class="login-box">

        <img src="image/logotipo.png" alt="Logo">

        <h2>Área do Aluno</h2>

        <input
            id="email"
            type="email"
            placeholder="Email">

        <input
            id="senha"
            type="password"
            placeholder="Senha">

        <button onclick="loginAluno()">
            Entrar
        </button>

        <p>
            Não possui conta?
            <a href="register.html">
                Criar Conta
            </a>
        </p>

    </div>

    <script type="module" src="js/login-aluno.js"></script>

</body>
</html>
